<!DOCTYPE html>
<html>
<head>
    <title>Community Clean-Up & Waste Reporting App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Community Clean-Up & Waste Reporting App</h1>

<form id="reportForm">
    <input type="text" id="name" placeholder="Your Name" required>

    <input type="text" id="location" placeholder="Waste Location" required>

    <textarea id="description" placeholder="Describe the waste problem"></textarea>

    <button type="submit">Submit Report</button>
</form>

<h2>Reported Cases</h2>
<ul id="reportList"></ul>

<script src="script.js"></script>

</body>
</html>
